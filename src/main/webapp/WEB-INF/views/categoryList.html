<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>카테고리 목록</h1>

<table>
  <tr><th>ID</th><th>이름</th></tr>
  <tr th:each="cat : ${categories}">
    <td th:text="${cat.id}"></td>
    <td th:text="${cat.name}"></td>
  </tr>
</table>

<p th:text="${'실습 수행 : ' + #dates.format(#dates.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171103 | 이름: 노수민'}"></p>
</body>
</html>
