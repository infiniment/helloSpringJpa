<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>카테고리 목록</h1>

<p th:if="${successMessage}" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red"></p>

<table>
    <tr><th>ID</th><th>이름</th><th>작업</th></tr>
  <tr th:each="cat : ${categories}">
    <td th:text="${cat.id}"></td>
    <td th:text="${cat.name}"></td>
    <td>
        <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
            <button type="submit">삭제</button>
        </form>
    </td>
  </tr>
</table>

<p th:text="${'실습 수행 : ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171103 | 이름: 노수민'}"></p>
</body>
</html>
